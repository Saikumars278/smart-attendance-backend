{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nim Technologies - Admin Portal Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #8db7b3, #7dd7d7);
            --accent-color: #6610f2;
            --accent-hover: #520dc2;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2d3748;
            --text-secondary: #718096;
        }

        body {
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            padding: 45px 40px;
            width: 100%;
            max-width: 440px;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.2);
        }

        /* Branding */
        .brand-logo {
            width: 70px;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        h2 {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 1.85rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Form Controls */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-text {
            background-color: #f7fafc;
            border: 2px solid #edf2f7;
            border-right: none;
            border-radius: 14px 0 0 14px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .form-control {
            background-color: #f7fafc;
            border: 2px solid #edf2f7;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(102, 16, 242, 0.1);
            outline: none;
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Button */
        .btn-modern {
            background: linear-gradient(135deg, var(--accent-color), #8a4af3);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            padding: 14px;
            margin-top: 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(102, 16, 242, 0.4);
        }

        .btn-modern:hover {
            background: linear-gradient(135deg, var(--accent-hover), var(--accent-color));
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(102, 16, 242, 0.5);
            color: white;
        }

        .btn-modern:active {
            transform: translateY(0);
        }

        /* Alerts */
        .alert-modern {
            background-color: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Footer */
        .footer-text {
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Decoration */
        .bg-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 30px 30px;
            z-index: -1;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>

    <div class="login-card text-center">
        <!-- Logo -->
        <img src="/static/images/logo.png" alt="Nim Technologies" class="brand-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
        
        <h2>Admin Portal</h2>
        <p class="subtitle">Secure access to Attendance Management</p>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <div class="alert-modern">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}

            <div class="text-start mb-3">
                <label class="form-label" for="username">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="username" class="form-control" id="username" placeholder="admin@nimtech.com" required>
                </div>
            </div>

            <div class="text-start mb-4">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-modern">
                    Login to Dashboard <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </div>
        </form>

        <div class="footer-text">
            &copy; 2025 Nim Technologies | Internal Use Only
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
